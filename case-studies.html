<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Studies — Zedex AI</title>
  <meta name="description" content="Real AI automation results from real clients. See how Zedex builds systems that replace manual work.">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F8FAFF;
      --bg-alt: #EFF6FF;
      --card: #FFFFFF;
      --border: rgba(37,99,235,0.12);
      --blue-border: rgba(37,99,235,0.2);
      --navy: #0F172A;
      --blue: #2563EB;
      --blue-light: #DBEAFE;
      --text-dim: #475569;
      --text-muted: #94A3B8;
      --radius: 16px;
      --radius-lg: 24px;
      --shadow-md: 0 4px 24px rgba(15,23,42,0.07);
      --shadow-lg: 0 8px 40px rgba(15,23,42,0.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--navy); font-family: 'Inter', system-ui, sans-serif; line-height: 1.6; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    a { text-decoration: none; color: inherit; }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; transition: background .3s, border-color .3s; background: transparent; border-bottom: 1px solid transparent; }
    nav.scrolled { background: rgba(248,250,255,0.92); backdrop-filter: blur(16px); border-bottom-color: var(--border); }
    .nav-inner { max-width: 1180px; margin: 0 auto; padding: 0 28px; height: 68px; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; }
    .logo-text { font-size: 19px; font-weight: 800; letter-spacing: -0.03em; color: var(--navy); }
    .logo-text em { font-style: normal; color: var(--blue); }
    .nav-links { display: flex; gap: 32px; align-items: center; }
    .nav-links a { font-size: 14px; color: var(--text-dim); font-weight: 500; transition: color 0.2s; }
    .nav-links a:hover { color: var(--navy); }
    .btn-primary { display: inline-flex; align-items: center; gap: 8px; background: var(--blue); color: #fff !important; padding: 10px 22px; border-radius: 999px; font-weight: 600; font-size: 14px; transition: background .2s, transform .2s; }
    .btn-primary:hover { background: #1D4ED8; transform: translateY(-1px); }

    /* CONTAINER */
    .container { max-width: 1180px; margin: 0 auto; padding: 0 28px; }

    /* PAGE HEADER */
    .page-header { padding: 140px 0 80px; text-align: center; }
    .section-tag { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--blue); display: inline-block; margin-bottom: 18px; }
    .page-header h1 { font-size: clamp(36px, 5vw, 58px); font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 20px; }
    .page-header p { font-size: 17px; color: var(--text-dim); max-width: 540px; margin: 0 auto; line-height: 1.7; }

    /* CASE GRID */
    .cases { padding: 0 0 120px; }
    .case-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 28px; }
    .case-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 36px 32px; box-shadow: var(--shadow-md); display: flex; flex-direction: column; gap: 22px; transition: transform .3s ease, border-color .3s ease, box-shadow .3s ease; }
    .case-card:hover { transform: translateY(-4px); border-color: var(--blue-border); box-shadow: var(--shadow-lg); }
    .case-logo { height: 42px; display: flex; align-items: center; }
    .case-logo img { max-height: 34px; max-width: 150px; object-fit: contain; opacity: .75; filter: grayscale(100%); transition: opacity .3s, filter .3s; }
    .case-card:hover .case-logo img { opacity: 1; filter: grayscale(0%); }
    .case-logo .logo-fallback { font-size: 13px; letter-spacing: .22em; text-transform: uppercase; color: var(--navy); font-weight: 700; opacity: .7; }
    .case-metric { padding: 22px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .case-number { font-size: 44px; font-weight: 800; color: var(--blue); line-height: 1; margin-bottom: 10px; letter-spacing: -.035em; }
    .case-metric-label { font-size: 13px; color: var(--text-dim); line-height: 1.55; }
    .case-quote { font-size: 15px; line-height: 1.68; color: var(--text-dim); flex-grow: 1; margin: 0; }
    .case-quote::before { content: '\201C'; font-size: 32px; color: var(--blue); line-height: 0; vertical-align: -10px; margin-right: 3px; }
    .case-author { display: flex; align-items: center; gap: 14px; padding-top: 4px; margin: 0; }
    .case-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--blue-light); flex-shrink: 0; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--blue); font-weight: 700; font-size: 16px; overflow: hidden; }
    .case-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .case-name { font-size: 14px; font-weight: 600; color: var(--navy); line-height: 1.2; margin-bottom: 3px; }
    .case-role { font-size: 12px; color: var(--text-muted); line-height: 1.3; }

    /* FOOTER */
    footer { background: var(--navy); padding: 48px 0; text-align: center; }
    footer p { font-size: 13px; color: rgba(255,255,255,0.3); }
    footer a { color: rgba(255,255,255,0.5); transition: color .2s; }
    footer a:hover { color: #fff; }

    @media (max-width: 820px) {
      .nav-links { display: none; }
      .page-header { padding: 120px 0 60px; }
      .case-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .container { padding: 0 20px; }
    }
  </style>
</head>
<body>

<nav id="siteNav">
  <div class="nav-inner">
    <a href="index.html" class="logo">
      <span class="logo-text">Zedex <em>AI</em></span>
    </a>
    <div class="nav-links">
      <a href="index.html#services">Services</a>
      <a href="index.html#process">How It Works</a>
      <a href="case-studies.html" style="color:var(--navy);font-weight:600">Case Studies</a>
      <a href="index.html#founder">About</a>
      <a href="index.html#faq">FAQ</a>
      <a href="https://calendly.com/krastev/meeting" target="_blank" rel="noopener" class="btn-primary">Book a Call</a>
    </div>
  </div>
</nav>

<main>
  <div class="page-header">
    <div class="container">
      <span class="section-tag">Case Studies</span>
      <h1>Real clients, real results.</h1>
      <p>Every project below started with a manual process and ended with a system that runs on its own.</p>
    </div>
  </div>

  <section class="cases">
    <div class="container">
      <div class="case-grid">
        <!-- Case study cards go here — added as Petar provides them -->
      </div>
    </div>
  </section>
</main>

<footer>
  <div class="container">
    <p>© <span id="year"></span> Zedex AI. Petar Krastev, Bulgaria. &nbsp;·&nbsp; <a href="mailto:petar@zedex.dev">petar@zedex.dev</a></p>
  </div>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();
  const nav = document.getElementById('siteNav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 20);
  }, { passive: true });
</script>
</body>
</html>
